name: Continuous Training MLOps Pipeline
on:
  schedule:
    # Run at 00:00 on the 1st of every 3rd month (Quarterly)
    - cron: '0 0 1 */3 *'
  push:
    branches: [ main ]
    paths:
      - 'src/ml/**'
      - 'src/etl/**'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  continuous-training:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v3
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install Dependencies
        run: pip install -r requirements.txt

      - name: Extract & Process Telemetry (ETL)
        run: python src/etl/pipeline.py --mock
        # Note: In a true production environment, you would remove --mock
        # and pull the latest Backblaze CSVs here.

      - name: Train XGBoost & Export
        run: python src/ml/train_survival.py --cpu

      - name: Commit Updated Model Artifacts
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add -f src/api/survival_model.json
          git add -f data/processed/telemetry.json
          
          # Only commit if there are changes
          if git diff --staged --quiet; then
            echo "No changes to model artifacts."
          else
            git commit -m "chore(mlops): automated continuous training model update"
            git push
          fi
